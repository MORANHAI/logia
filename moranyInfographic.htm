<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Lifecycle</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script>
        function showStep(step) {
            const steps = document.querySelectorAll('.step');
            steps.forEach(s => s.style.display = 'none');
            document.getElementById('step' + step).style.display = 'block';
        }
    </script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-5">
        <h1 class="text-3xl font-bold text-center mb-5">Activity Lifecycle</h1>
        <div class="flex justify-center mb-4">
            <button class="bg-blue-500 text-white px-4 py-2 rounded mr-2" onclick="showStep(1)">Step 1</button>
            <button class="bg-blue-500 text-white px-4 py-2 rounded mr-2" onclick="showStep(2)">Step 2</button>
            <button class="bg-blue-500 text-white px-4 py-2 rounded" onclick="showStep(3)">Step 3</button>
        </div>
        <div id="step1" class="step border p-4 mb-2 bg-white hidden">
            <h2 class="text-xl font-semibold">Step 1</h2>
            <p>Details about step 1...</p>
        </div>
        <div id="step2" class="step border p-4 mb-2 bg-white hidden">
            <h2 class="text-xl font-semibold">Step 2</h2>
            <p>Details about step 2...</p>
        </div>
        <div id="step3" class="step border p-4 mb-2 bg-white hidden">
            <h2 class="text-xl font-semibold">Step 3</h2>
            <p>Details about step 3...</p>
        </div>
    </div>
</body>
</html>
